# Docker Hub Personal Access Token 配置占位符
#
# 在 Harness UI 中创建 Secret：
#   Project Setup → Secrets → New Secret → Text
#
# Secret 名称：
#   - dockerhub_pat       （Docker Hub Access Token）
#   - dockerhub_username  （Docker Hub 用户名）
#   - github_pat          （GitHub Personal Access Token）
#
# 或使用 Harness CLI：
#   harness secret apply --token YOUR_TOKEN --secret-name "dockerhub_pat"
#   harness secret apply --token YOUR_USERNAME --secret-name "dockerhub_username"
#   harness secret apply --token YOUR_GITHUB_PAT --secret-name "github_pat"

# 以下为 Harness Secret Text YAML 格式（用于 CLI 导入）
# 注意：Secret 值不应直接写入 YAML，应通过 CLI 交互式输入或引用环境变量
harnessApiVersion: '1.0'
type: SecretText
metadata:
  name: dockerhub_pat
  description: Docker Hub Personal Access Token for image push
spec:
  valueRef: <+input>
  manageUnder: secrets
  visibility: private
